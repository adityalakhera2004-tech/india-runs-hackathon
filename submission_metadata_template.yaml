# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini"
  - "Claude"
  - "GitHub Copilot"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  - Claude: Used for preliminary architectural brainstorming, cross-checking candidate scoring metrics, and vetting the initial filtration logic.
  - Gemini: Used for intensive debugging of data ingestion pipelines, resolving dictionary attribute exceptions, and structuring the final hybrid search integration code.
  - GitHub Copilot: Used as a local autocomplete companion to accelerate code implementation and boilerplate generation.
  - Compliance Note: All tools were used strictly for structural and logic assistance; zero candidate or competition dataset rows were shared with any external LLM APIs.

# ============================================================================

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  - Applied heuristic structural filters to isolate ideal candidate timelines (5-9 years experience).
  - Detected and eliminated plain-language Tier 5 profiles, behaviorally inactive accounts (>6 months since login), and keyword-stuffer traps (e.g., Marketing titles with 'RAG' skills).
  - Built a local, zero-network Hybrid Search ranking pipeline to evaluate the remaining candidate pool under strict CPU constraints.
  - Concatenated job titles, skills, and experience descriptions to eliminate empty-field indexing errors (ZeroDivisionError) and maximize data density.
  - Implemented a dual-engine architecture: a BM25Okapi lexical index for exact keyword matching, and a BAAI/bge-small-en-v1.5 dense semantic model for deeper contextual evaluation.
  - Fused scores using a weighted combination: 30% Structural Score, 30% Normalized Lexical Score, and 40% Semantic Cosine Similarity.
  - Extracted exact tech-stack matches dynamically to populate detailed proof-of-work summaries.
  - Runtime is highly optimized for local CPU execution, processing the final target pool in under 10 seconds.

